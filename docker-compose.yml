services:
  claude-slack-bridge:
    container_name: claude-slack-bridge
    build: .
    env_file:
      - .env
    environment:
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN}
    volumes:
      # Persist Claude CLI session data across container restarts
      - claude-data:/home/appuser/.claude
      # Mount Claude CLI credentials (read-only)
      - ${HOME}/.claude/.credentials.json:/home/appuser/.claude/.credentials.json
      # Mount all projects so claude -p can run from the correct project directory
      - ${PROJECTS_DIR}:/projects
    restart: unless-stopped

volumes:
  claude-data:
